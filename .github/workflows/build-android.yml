# Build the Android APK with Buildozer on Ubuntu (same idea as local Linux/WSL).
#
# Notes:
# - First run can take 1–3+ hours (downloads NDK/SDK, compiles OpenCV + extras).
# - Re-runs are faster if the cache hits (~/.buildozer and ./.buildozer).
# - Standard GitHub-hosted runners have ~7 GB RAM; if the job dies with OOM,
#   try a larger runner (org setting) or reduce parallel compile (see env below).
# - Trigger: Actions tab → this workflow → Run workflow.

name: Build Android APK

on:
  workflow_dispatch:
  # Uncomment to build on every push to main (uses many CI minutes):
  # push:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  # Slightly reduce parallel native builds to lower peak RAM on default runners.
  MAKEFLAGS: -j2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-venv python3-dev \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libfreetype6-dev

      - name: Install Buildozer toolchain
        run: |
          python -m pip install --upgrade pip
          pip install Cython buildozer

      - name: Ensure LBF landmark model
        run: |
          test -f lbfmodel.yaml || python download_lbf_model.py

      - name: Cache Buildozer downloads and build trees
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK (debug)
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eyecontrol-debug-apk
          path: bin/*.apk
          if-no-files-found: error
