# Build the Android APK with Buildozer on Ubuntu.
#
# Notes:
# - opencv vs opencv_extras version mismatch in upstream p4a is fixed via ./p4a_recipes.
# - Runner is ubuntu-22.04 (not -latest / 24.04): Autoconf 2.72 on 24.04 breaks libffi
#   autoreconf with "LT_SYS_SYMBOL_USCORE" undefined — a known p4a/Buildozer issue.
# - First run can take 1–2+ hours; cache helps on re-runs.
# - Trigger: Actions → Build Android APK → Run workflow.

name: Build Android APK

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  MAKEFLAGS: -j2
  # Use Node 24 for Actions (avoids Node 20 deprecation on runner).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Add swap (reduces OOM during OpenCV compile)
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-venv python3-dev \
            autoconf automake libtool libtool-bin libltdl-dev pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libfreetype6-dev

      - name: Install Buildozer toolchain
        run: |
          python -m pip install --upgrade pip
          pip install Cython buildozer

      - name: Ensure LBF landmark model
        run: |
          test -f lbfmodel.yaml || python download_lbf_model.py

      - name: Cache Buildozer downloads and build trees
        uses: actions/cache@v5
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu22-${{ hashFiles('buildozer.spec', 'p4a_recipes/opencv_extras/__init__.py') }}
          restore-keys: |
            buildozer-ubuntu22-

      - name: Build APK (debug)
        run: |
          # Runner predefines NDK paths; unset so p4a uses Buildozer’s NDK only.
          unset ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT || true
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: eyecontrol-debug-apk
          path: bin/*.apk
          if-no-files-found: error
